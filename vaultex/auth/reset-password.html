<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vaultex</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/responsive.css">
</head>
<body>

<div class="auth-form-wrap" style="min-height:100vh;">
  <div class="auth-card text-center">
    <a href="../index.html" class="nav-logo" style="justify-content:center;margin-bottom:32px;"><span class="mark">V</span><span class="brand-name">Vaultex</span></a>
    
    <div class="feature-icon" style="margin:0 auto 18px;">⛉</div>
    <h2>Set a new password</h2>
    <p>Choose a strong password you haven't used before.</p>
    <form id="reset-form">
      <div id="form-error" class="field-hint" style="display:none;color:var(--coral);background:var(--coral-dim);padding:10px 14px;border-radius:8px;margin-bottom:18px;text-align:left;"></div>
      <div class="field" style="text-align:left;">
        <label for="rp-password">New password</label>
        <input type="password" id="rp-password" placeholder="At least 8 characters" minlength="8" required>
      </div>
      <div class="field" style="text-align:left;">
        <label for="rp-confirm">Confirm new password</label>
        <input type="password" id="rp-confirm" placeholder="Re-enter your new password" minlength="8" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="reset-submit">Reset password</button>
    </form>

  </div>
</div>

<script src="../assets/js/main.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../assets/js/firebase-init.js"></script>
<script>
(function () {
  'use strict';

  const params = new URLSearchParams(window.location.search);
  const oobCode = params.get('oobCode'); // Firebase appends this to the reset link automatically

  const form = document.getElementById('reset-form');
  const err = document.getElementById('form-error');
  const submitBtn = document.getElementById('reset-submit');

  function showError(msg) {
    err.textContent = msg;
    err.style.display = 'block';
  }

  if (!oobCode) {
    showError('This reset link is invalid or has expired. Please request a new one.');
    form.querySelectorAll('input, button').forEach(el => el.disabled = true);
  }

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    err.style.display = 'none';

    const pw = document.getElementById('rp-password').value;
    const confirm = document.getElementById('rp-confirm').value;

    if (pw !== confirm) {
      showError("Passwords don't match.");
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Resetting…';

    try {
      // Verifies the oobCode is valid, then sets the new password —
      // this is the real Firebase call, not a redirect stub.
      await auth.confirmPasswordReset(oobCode, pw);
      window.location.href = 'login.html?reset=success';
    } catch (error) {
      let message = 'Something went wrong. Please request a new reset link.';
      if (error.code === 'auth/expired-action-code') message = 'This reset link has expired. Please request a new one.';
      if (error.code === 'auth/invalid-action-code') message = 'This reset link is invalid or has already been used.';
      if (error.code === 'auth/weak-password') message = 'Please choose a stronger password (at least 8 characters).';
      showError(message);
      submitBtn.disabled = false;
      submitBtn.textContent = 'Reset password';
    }
  });
})();
</script>
</body>
</html>
